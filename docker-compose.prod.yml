services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./rails
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # 1. Definimos el Host (Asegúrate que APP_DOMAIN sea nutripet.cloud)
      - "traefik.http.routers.backend.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=leresolver"

      # 2. Forzar que el certificado incluya AMBOS dominios (Crucial para el error de "No seguro")
      - "traefik.http.routers.backend.tls.domains[0].main=${APP_DOMAIN}"
      - "traefik.http.routers.backend.tls.domains[0].sans=www.${APP_DOMAIN}"

      # 3. Middleware para redireccionar nutripet.cloud -> www.nutripet.cloud (Opcional pero recomendado)
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https?://${APP_DOMAIN}/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://www.${APP_DOMAIN}/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"

      # 4. Aplicar el middleware al router
      - "traefik.http.routers.backend.middlewares=www-redirect"

      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    networks:
      - web
      - internal
    depends_on:
      - db

volumes:
  db-data:

networks:
  web:
    external: true
    name: rentshield_web
  internal:
    driver: bridge
