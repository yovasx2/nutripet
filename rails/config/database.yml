default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "postgres" } %>

development:
  <<: *default
  database: nutripet_development

test:
  <<: *default
  database: nutripet_test

production:
  <<: *default
  database: nutripet_production
  username: nutripet
  password: <%= ENV["RENTSHIELD_DATABASE_PASSWORD"] %>
